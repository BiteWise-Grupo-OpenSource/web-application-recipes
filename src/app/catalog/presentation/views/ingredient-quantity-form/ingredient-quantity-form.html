<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-form-field appearance="fill">
    <mat-label>Recipe</mat-label>
    <mat-select formControlName="recipeId">
      <mat-option *ngFor="let recipe of store.recipes()" [value]="recipe.id">{{ recipe.title }}</mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Ingredient</mat-label>
    <mat-select formControlName="ingredientId">
      <mat-option *ngFor="let ingredient of store.ingredients()" [value]="ingredient.id">{{ ingredient.name }}</mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Quantity</mat-label>
    <input matInput type="number" formControlName="quantity" />
  </mat-form-field>

  <button mat-raised-button color="primary" type="submit">Save</button>
  <button mat-button type="button" (click)="router.navigate(['catalog/ingredient-quantities'])">Cancel</button>
</form>
