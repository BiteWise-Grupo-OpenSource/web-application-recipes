<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-form-field>
    <mat-label>Name</mat-label>
    <input matInput formControlName="name" />
  </mat-form-field>

  <mat-form-field>
    <mat-label>Category</mat-label>
    <mat-select formControlName="categoryId">
      <mat-option *ngFor="let category of store.categories()" [value]="category.id">{{ category.name }}</mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field>
    <mat-label>Nutrient</mat-label>
    <mat-select formControlName="nutrientsId">
      <mat-option *ngFor="let nutrient of store.nutrients()" [value]="nutrient.id">{{ nutrient.id }} - {{ nutrient.calories }} cal</mat-option>
    </mat-select>
  </mat-form-field>

  <button mat-raised-button color="primary" type="submit">{{ isEdit ? 'Save' : 'Create' }}</button>
</form>
