@if (store.loading()) {
  <mat-spinner diameter="40"></mat-spinner>
}
@if (store.error()) {
  <mat-error>{{ store.error() }}</mat-error>
}
<table mat-table [dataSource]="store.recipes()" class="mat-elevation-z8">
  <!-- ID Column -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef> ID </th>
    <td mat-cell *matCellDef="let recipe"> {{ recipe.id }} </td>
  </ng-container>

  <!-- Title Column -->
  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef> Title </th>
    <td mat-cell *matCellDef="let recipe"> {{ recipe.title }} </td>
  </ng-container>

  <!-- Description Column -->
  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef> Description </th>
    <td mat-cell *matCellDef="let recipe"> {{ recipe.description }} </td>
  </ng-container>

  <ng-container matColumnDef="recipeTypeId">
    <th mat-header-cell *matHeaderCellDef> Type ID </th>
    <td mat-cell *matCellDef="let recipe"> {{ recipe.recipeTypeId }} </td>
  </ng-container>

  <ng-container matColumnDef="totalNutrientsId">
    <th mat-header-cell *matHeaderCellDef> Nutrients ID </th>
    <td mat-cell *matCellDef="let recipe"> {{ recipe.totalNutrientsId }} </td>
  </ng-container>

  <!-- Actions Column -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> Actions </th>
    <td mat-cell *matCellDef="let recipe">
      <button mat-button (click)="editRecipe(recipe.id)">Edit</button>
      <button mat-button (click)="deleteRecipe(recipe.id)">Delete</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

<button mat-raised-button color="primary" (click)="router.navigate(['catalog/recipes/new'])">Add Recipe</button>
